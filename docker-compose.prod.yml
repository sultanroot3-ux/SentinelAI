# Production overrides — use together with the base file:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Adds: ports 80/443 with Let's Encrypt, restart policies, daily DB backups,
# log rotation, and removes the backend's direct port exposure (nginx only).
# Normally you never run this by hand — deployment/install_ubuntu.sh does.

services:
  db:
    restart: unless-stopped
    logging: &logging
      driver: json-file
      options: { max-size: "10m", max-file: "5" }

  backend:
    restart: unless-stopped
    logging: *logging
    # Backend is reachable only through nginx in production
    ports: !override []
    environment:
      - SENTINEL_ENV=production
      - SENTINEL_SECRET_KEY=${SENTINEL_SECRET_KEY:?set SENTINEL_SECRET_KEY in .env (openssl rand -hex 32)}
      - SENTINEL_DATABASE_URL=postgresql+psycopg2://sentinel:${SENTINEL_DB_PASSWORD}@db:5432/sentinelai
      - UVICORN_WORKERS=${UVICORN_WORKERS:-2}
      # nginx sits on the compose network; trust its X-Forwarded-For so login
      # rate limiting sees real client IPs (see app.core.net)
      - SENTINEL_TRUSTED_PROXY_IPS=${SENTINEL_TRUSTED_PROXY_IPS:-["172.16.0.0/12"]}

  frontend:
    restart: unless-stopped
    logging: *logging
    environment:
      # Seconds between certificate-change checks (hot nginx reload on renewal)
      - CERT_WATCH_INTERVAL=${CERT_WATCH_INTERVAL:-3600}
    ports: !override
      - "80:80"
      - "443:443"
    volumes: !override
      # Rendered from docker/nginx.prod.conf.template by install_ubuntu.sh
      - ./docker/nginx.rendered.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot-certs:/etc/letsencrypt:ro
      - certbot-www:/var/www/certbot:ro

  # Renews Let's Encrypt certificates; nginx reloads pick up new certs on
  # restart (certbot deploy-hook writes a flag the ops cron watches — see
  # deployment/DEPLOYMENT.md §HTTPS).
  certbot:
    image: certbot/certbot
    restart: unless-stopped
    volumes:
      - certbot-certs:/etc/letsencrypt
      - certbot-www:/var/www/certbot
    entrypoint: >
      /bin/sh -c 'trap exit TERM;
      while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done'
    logging: *logging

  # Daily pg_dump with retention (RETENTION_DAYS, default 14), written to the
  # host ./backups directory so they survive container removal.
  backup:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      - PGPASSWORD=${SENTINEL_DB_PASSWORD}
      - RETENTION_DAYS=${BACKUP_RETENTION_DAYS:-14}
    volumes:
      - ./backups:/backups
      - ./deployment/backup_loop.sh:/backup_loop.sh:ro
    depends_on:
      db:
        condition: service_healthy
    entrypoint: ["/bin/sh", "/backup_loop.sh"]
    logging: *logging

volumes:
  certbot-certs:
  certbot-www:
