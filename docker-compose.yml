services:
  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=sentinel
      - POSTGRES_PASSWORD=sentinel
      - POSTGRES_DB=sentinelai
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sentinel -d sentinelai"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - sentinel-data:/data
    # Camera access inside a container is host-specific; on Linux uncomment:
    # devices:
    #   - /dev/video0:/dev/video0
    environment:
      - SENTINEL_SECRET_KEY=change-me-in-production
      - SENTINEL_DATABASE_URL=postgresql+psycopg2://sentinel:sentinel@db:5432/sentinelai
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  pg-data:
  sentinel-data:
