# SentinelAI frontend + API proxy.
# Port 80 redirects to HTTPS; port 443 serves the dashboard with TLS.
# Certificates are mounted at /etc/nginx/certs (self-signed for local use,
# real certs — e.g. certbot — in production; see deployment/DEPLOYMENT.md).

server {
    listen 80;
    server_name _;
    # Allow plain-HTTP health probes, redirect everything else to HTTPS
    location = /api/health {
        proxy_pass http://backend:8000;
    }
    location / {
        return 301 https://$host:8443$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name _;

    ssl_certificate     /etc/nginx/certs/sentinel.crt;
    ssl_certificate_key /etc/nginx/certs/sentinel.key;
    ssl_protocols       TLSv1.2 TLSv1.3;

    root /usr/share/nginx/html;
    index index.html;

    # Security headers for the dashboard
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;
    # Vite bundles all JS/CSS locally; images may be blob/data URLs (snapshots, previews)
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data: blob:; style-src 'self' 'unsafe-inline'; connect-src 'self'; frame-ancestors 'none'" always;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_buffering off;          # keep MJPEG stream flowing
        proxy_read_timeout 3600s;
    }

    location /static/ {
        proxy_pass http://backend:8000;
    }
}
