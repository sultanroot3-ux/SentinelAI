name: 🐛 Bug Report
description: Something in SentinelAI is not working correctly
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug!
        ⚠️ **Security vulnerabilities must NOT be reported here** — use
        [private vulnerability reporting](https://github.com/sultanroot3-ux/SentinelAI/security/advisories/new) instead (see SECURITY.md).
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Clear description of the bug.
      placeholder: The camera stream shows a 503 even though...
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Log in as admin
        2. Open Live Camera
        3. Toggle AI Overlay
        4. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - Backend API
        - Frontend dashboard
        - Face detection / recognition
        - Liveness detection
        - Camera / streaming
        - Notifications (Email/Telegram/Discord)
        - Reports
        - Database / migrations
        - Docker / deployment
        - Other
    validations:
      required: true
  - type: dropdown
    id: database
    attributes:
      label: Database
      options:
        - SQLite (default)
        - PostgreSQL
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Python/Node versions, insightface installed or not, browser.
      placeholder: |
        macOS 15 / Python 3.11 / Node 20
        insightface: yes
        Browser: Chrome 126
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Backend log lines (logs/sentinel.log) or browser console output. Redact secrets.
      render: shell
